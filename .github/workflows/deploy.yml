name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/music-bot
            git pull origin master
            if grep -q '^PROXY_URL=' bot/.env; then
              sed -i 's|^PROXY_URL=.*|PROXY_URL=http://8.219.97.57:80|' bot/.env
            else
              echo 'PROXY_URL=http://8.219.97.57:80' >> bot/.env
            fi
            docker-compose down
            docker-compose up -d --build