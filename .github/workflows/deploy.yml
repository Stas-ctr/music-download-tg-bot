name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/music-bot
            git pull origin master
            sed -i 's|^BOT_TOKEN=.*|BOT_TOKEN=8341360696:AAHn9QFP5IuUqV6_4hRBdC0DXqffMYYgZ8w|' bot/.env
            docker-compose down
            docker-compose up -d --build