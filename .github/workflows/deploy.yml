name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/music-bot
            git pull origin master
            sed -i 's|^PROXY_URL=.*|PROXY_URL=|' bot/.env
            if grep -q '^TELEGRAM_API_URL=' bot/.env; then
              sed -i 's|^TELEGRAM_API_URL=.*|TELEGRAM_API_URL=https://tg-proxy.syperstad.workers.dev|' bot/.env
            else
              echo 'TELEGRAM_API_URL=https://tg-proxy.syperstad.workers.dev' >> bot/.env
            fi
            docker-compose down
            docker-compose up -d --build