name: Update Token

on:
  workflow_dispatch:
    inputs:
      token:
        description: 'New bot token'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/music-bot
            sed -i 's|^BOT_TOKEN=.*|BOT_TOKEN=${{ github.event.inputs.token }}|' bot/.env
            docker-compose restart bot
