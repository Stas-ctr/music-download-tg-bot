name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/music-bot
            git pull origin master
            curl -s --max-time 5 https://tg-proxy.syperstad.workers.dev/bot/test/getMe && echo "WORKER OK" || echo "WORKER FAIL"
            sed -i 's|^PROXY_URL=.*|PROXY_URL=|' bot/.env
            docker-compose down
            docker-compose up -d --build