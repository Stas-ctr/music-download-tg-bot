version: '3.8'
services:
  bot:
    build: .
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: music_bot
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data: